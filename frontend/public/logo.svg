<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="SiteForge AI logo">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7BBDE8"/>
      <stop offset="100%" stop-color="#0A4174"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7BBDE8"/>
      <stop offset="100%" stop-color="#0A4174"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7BBDE8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7BBDE8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft glow background -->
  <rect width="64" height="64" fill="url(#glow)"/>

  <!-- Outer dashed ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#ringGrad)" stroke-width="1.4" stroke-dasharray="3 5" opacity="0.9"/>

  <!-- Inner ring with orbit node -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#7BBDE8" stroke-opacity="0.45" stroke-width="0.9"/>
  <circle cx="54" cy="32" r="2.4" fill="#7BBDE8"/>

  <!-- Hex core -->
  <polygon points="32,12 50,22 50,42 32,52 14,42 14,22" fill="url(#coreGrad)" stroke="#7BBDE8" stroke-width="1"/>

  <!-- SF monogram inside core -->
  <g fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- S -->
    <path d="M28 23 c-1.5 -1.6 -5 -2 -7 -0.4 c-1.5 1.2 -1 3 0.8 3.5 c1.8 0.5 4.2 0.6 5.6 1.6 c1.6 1.1 1.4 3.4 -0.3 4.4 c-2.2 1.3 -5.4 0.4 -7 -1.2"/>
    <!-- F -->
    <path d="M34 21 L41 21"/>
    <path d="M34 27 L39 27"/>
    <path d="M34 21 L34 35"/>
  </g>

  <!-- Status pulse dot (top-right) -->
  <circle cx="50" cy="14" r="3" fill="#7BBDE8" stroke="#0A1929" stroke-width="1.2"/>
</svg>
